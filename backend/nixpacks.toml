[phases.setup]
nixPkgs = ["python312", "postgresql"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.prod.txt"
]

[phases.build]
cmds = [". /opt/venv/bin/activate && python database.py"]

[start]
cmd = ". /opt/venv/bin/activate && python app.py"
